# goreleaser configuration — UniFi
#
# This repo ships both a Go SDK and the `unifi` CLI binary. goreleaser builds
# the CLI for multiple platforms and cuts tag-driven GitHub releases. Release
# notes come from git-cliff.
#
# SemVer enforcement:
#   goreleaser already refuses to run on a tag it cannot parse as semantic
#   versioning. The `before` hook below adds a strict, explicit guard so a
#   malformed tag fails fast with a clear message (vMAJOR.MINOR.PATCH with
#   optional -prerelease and +build metadata). The release workflow performs the
#   same check before goreleaser runs (defense in depth).
version: 2

project_name: unifi

before:
  hooks:
    - >-
      sh -c 'echo "Validating SemVer tag: ${GORELEASER_CURRENT_TAG}";
      echo "${GORELEASER_CURRENT_TAG}" | grep -Eq
      "^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$"
      || { echo "ERROR: tag ${GORELEASER_CURRENT_TAG} is not valid SemVer (expected vX.Y.Z[-prerelease][+build])"; exit 1; }'
    - go mod tidy

# The repo ships both a Go SDK and the `unifi` CLI. Build the CLI binary.
builds:
  - id: unifi
    main: ./cmd/unifi
    binary: unifi
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

# Sort tags by semantic version so the previous tag is resolved correctly.
git:
  tag_sort: -version:refname

# CHANGELOG.md is generated by git-cliff; release notes are supplied via
# --release-notes in the workflow. Disable goreleaser's own changelog.
changelog:
  disable: true

release:
  github:
    owner: thathaneydude
    name: unifi
  # SemVer prereleases (e.g. v1.2.0-rc.1) are published as GitHub pre-releases.
  prerelease: auto
  mode: replace
  name_template: "{{ .Tag }}"
